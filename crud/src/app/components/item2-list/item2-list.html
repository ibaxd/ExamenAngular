<div class="container mt-4" style="max-width:600px">
  <h2 class="mb-3">{{ editingId ? 'Editar' : 'Nuevo' }} Item2</h2>

  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input [(ngModel)]="form.nombre" class="form-control" placeholder="Nombre" />
    @if (submitted && !form.nombre) {
      <span class="text-danger">El nombre es requerido</span>
    }
  </div>

  <div class="mb-3">
    <label class="form-label">Descripción</label>
    <input [(ngModel)]="form.descripcion" class="form-control" placeholder="Descripción" />
    @if (submitted && !form.descripcion) {
      <span class="text-danger">La descripción es requerida</span>
    }
  </div>

  <div class="d-flex gap-2 mb-4">
    <button (click)="save()" class="btn btn-primary">{{ editingId ? 'Actualizar' : 'Agregar' }}</button>
    <button (click)="reset()" class="btn btn-secondary">Limpiar</button>
  </div>

  <hr>
  <h2 class="mb-3">Lista Item2</h2>

  @for (item of items; track item.id) {
    <div class="card mb-2">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <strong>{{ item.nombre }}</strong> — {{ item.descripcion }}
        </div>
        <div class="d-flex gap-2">
          <button (click)="edit(item)" class="btn btn-warning btn-sm">Editar</button>
          <button (click)="delete(item.id!)" class="btn btn-danger btn-sm">Eliminar</button>
        </div>
      </div>
    </div>
  }
</div>
